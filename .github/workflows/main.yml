on: push
name: 🚀 Deploy website on push
jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: 🚚 Get latest code
              uses: actions/checkout@v3
            - name: Setup Node.js 17.x
              uses: actions/setup-node@v1
              with:
                  node-version: 17.x
            - run: npm install
            - run: npm run build --if-present

    Deploy:
        needs: Build
        runs-on: ubuntu-latest
        steps:
            - name: 📂 Sync files
              uses: sand4rt/ftp-deployer@v1.7
              with:
                  sftp: true
                  host: ${{ secrets.IONOS_SFTP_SERVER }}
                  port: 22
                  username: ${{ secrets.IONOS_SFTP_USERNAME }}
                  password: ${{ secrets.IONOS_SFTP_PASSWORD }}

                  local_folder: dist
                  cleanup: true
                  include: '["*", "**/*", ".*"]'
