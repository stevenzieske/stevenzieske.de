on: push
name: 🚀 Deploy website on push
jobs:
    build:
        name: 🛠️ Build
        runs-on: ubuntu-latest
        steps:
            - name: 🚚 Get latest code
              uses: actions/checkout@v3
            - name: 🖥️ Setup Node.js 17.x
              uses: actions/setup-node@v1
              with:
                  node-version: 17.x
            - run: |
                  npm install
                  npm run build --if-present
            - name: ⏫ Archive production artifact
              uses: actions/upload-artifact@v3
              with:
                  name: stevenzieske.de-dist
                  path: dist/
                  retention-days: 1

    deploy:
        name: 🚀 Deploy
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: ⏬ Download production artifact from Build job
              uses: actions/download-artifact@v3
              with:
                  name: stevenzieske.de-dist
            - run: ls -l index.html
